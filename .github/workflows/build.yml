name: Build GDExtension

on:
  workflow_dispatch:
  # Called by release-please.yml when a release is created. The tag input
  # makes the merge job attach the packaged zip to that GitHub Release.
  workflow_call:
    inputs:
      release-tag:
        description: "Release tag to attach the packaged artifact to (e.g. v0.1.0)"
        type: string
        required: false
        default: ""

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        # Platforms match the entries declared in demo/addons/native-video/native-video.gdextension.
        # Single precision only: the .gdextension ships no double-precision
        # entries (known limitation).
        target:
          [
            { platform: macos, arch: universal, os: macos-latest },
            { platform: ios, arch: arm64, os: macos-latest },
            { platform: windows, arch: x86_64, os: windows-latest },
            { platform: windows, arch: x86_32, os: windows-latest },
            { platform: windows, arch: arm64, os: windows-latest },
          ]
        target-type: [template_debug, template_release]

    name: Build ${{ matrix.target.platform }}-${{ matrix.target-type }}-${{ matrix.target.arch }}
    runs-on: ${{ matrix.target.os }}
    env:
      APPLE_CERT_BASE64: ${{ secrets.APPLE_CERT_BASE64 }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup godot-cpp
        uses: ./godot-cpp/.github/actions/setup-godot-cpp
        with:
          platform: ${{ matrix.target.platform }}
          em-version: 3.1.62

      - name: Restore .scons-cache
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/.scons-cache/
            ${{ github.workspace }}/**/.sconsign.dblite
          key: ${{ matrix.target.platform }}-${{ matrix.target.arch }}-${{ matrix.target-type }}-${{ github.ref }}
          restore-keys: |
            ${{ matrix.target.platform }}-${{ matrix.target.arch }}-${{ matrix.target-type }}
            ${{ matrix.target.platform }}-${{ matrix.target.arch }}-

      - name: Build GDExtension
        shell: sh
        env:
          SCONS_CACHE: ${{ github.workspace }}/.scons-cache/
        run: |
          scons target=${{ matrix.target-type }} platform=${{ matrix.target.platform }} arch=${{ matrix.target.arch }}

      - name: Windows - Delete compilation files
        if: ${{ matrix.target.platform == 'windows' }}
        shell: pwsh
        run: |
          # The SharedLibrary target writes the .dll plus linker byproducts
          # (.lib/.exp import libs for MSVC, .a archives for MinGW/arm64,
          # .pdb debug info) into bin/windows/. Sweep the whole bin tree so
          # none of them ship in the release artifact — only the .dll should.
          Get-ChildItem -Path bin -Recurse -Include *.exp,*.lib,*.a,*.pdb -File |
            Remove-Item -Force

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: native-video-${{ matrix.target.platform }}-${{ matrix.target.arch }}-${{ matrix.target-type }}
          path: |
            ${{ github.workspace }}/bin/**

  # Merges all the build artifacts together into a single native-video
  # artifact and, when invoked for a release, attaches the packaged zip to
  # the GitHub Release.
  merge:
    runs-on: ubuntu-22.04
    needs: build
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: native-video-*
          path: artifacts

      - name: Create final artifact structure
        run: |
          # Godot Asset Library requires plug-in contents under
          # addons/<addon name>/. The .gdextension, per-platform lib dirs,
          # LICENSE, and README all live there.
          mkdir -p final-artifact/addons/native-video
          # Copy contents of each artifact into the addon folder
          for dir in artifacts/native-video-*; do
            cp -r "$dir"/* final-artifact/addons/native-video/
          done
          # Copy LICENSE, README.md, and .gdextension into the addon folder
          cp LICENSE README.md final-artifact/addons/native-video/
          cp demo/addons/native-video/native-video.gdextension final-artifact/addons/native-video/

      - name: Upload final artifact
        uses: actions/upload-artifact@v4
        with:
          name: native-video
          path: final-artifact/**

      - name: Delete individual artifacts
        uses: geekyeggo/delete-artifact@v5
        with:
          name: native-video-*

      - name: Attach zip to GitHub Release
        if: inputs.release-tag != ''
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release-tag }}
        run: |
          (cd final-artifact && zip -r "../native-video-${RELEASE_TAG}.zip" .)
          gh release upload "$RELEASE_TAG" "native-video-${RELEASE_TAG}.zip" --clobber
