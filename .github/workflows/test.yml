name: Test

on:
  push:
    branches: ["main"]
    paths:
      - "src/**"
      - "project/**"
      - "tools/**"
      - "vendor/**"
      - ".gitmodules"
      - "build.zig"
      - "build.zig.zon"
      - ".github/workflows/test.yml"
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  test:
    name: Build & Test (macOS)
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Run core tests
        run: zig build test --summary all

      - name: Build extension
        run: zig build --summary all

      - name: Decode smoke test
        run: zig build decode-smoke

      - name: Godot integration smoke test
        timeout-minutes: 2
        run: zig build smoke

  test-windows:
    name: Build & Test (Windows)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Generate mandatory decode fixtures
        shell: bash
        run: |
          bash tools/gen_stress_media.sh --duration 3
          cp tests/fixtures/stress/bframes.mp4 project/bframes.mp4
          test -s project/bframes.mp4
          test -s tests/fixtures/stress/nonmod16_854x480.mp4

      - name: Run core tests
        run: zig build test --summary all

      - name: Build extension
        run: zig build --summary all

      - name: Decode smoke test
        run: zig build decode-smoke -- project/bframes.mp4
