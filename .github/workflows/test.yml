name: Test

on:
  push:
    branches: ["main"]
    paths:
      - "src/**"
      - "build.zig"
      - "build.zig.zon"
      - ".github/workflows/test.yml"
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  test:
    name: Core Tests (macOS)
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Run core tests
        run: zig build test --summary all
