name: Engine Core Tests

on:
  push:
    branches: ["main"]
    paths:
      - "src/core/**"
      - "src/backends/**"
      - "src/common/**"
      - "tests/**"
      - "tools/**"
      - "SConstruct"
      - ".gitmodules"
      - ".github/godot-version"
      - ".github/workflows/core-tests.yml"
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  test-media:
    # Generates ALL test media (synthetic marker clip + real-clip matrix) once,
    # on the cheapest runner, and shares it with the backend coverage jobs via
    # an artifact. The clips are plain media files with no platform-specific
    # content, so where they are encoded is irrelevant to what the backends
    # decode. ffmpeg is a TEST-ONLY tool (never a runtime dependency); doing
    # the generation here keeps CI independent of Git LFS bandwidth without
    # paying for an ffmpeg install on every runner.
    #
    # The generated files are also cached across runs, keyed on the generator
    # scripts: on a cache hit the ffmpeg install and generation are skipped
    # entirely. Bump the v1 prefix to force regeneration (e.g. after an ffmpeg
    # behavior change worth picking up).
    name: Generate Test Media
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore cached test media
        id: media-cache
        uses: actions/cache@v4
        with:
          path: |
            tests/fixtures/synthetic.mp4
            tests/fixtures/synthetic-mt.mp4
            tests/fixtures/matrix
          key: test-media-v2-${{ hashFiles('tools/gen_test_media.sh', 'tools/gen_clip_matrix.sh') }}

      - name: Install ffmpeg
        if: steps.media-cache.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Generate synthetic test media
        if: steps.media-cache.outputs.cache-hit != 'true'
        # Doubles as the smoke-test for the generator script: it re-runs
        # whenever the script changes (cache miss) and fails the workflow if
        # generation breaks.
        run: |
          bash tools/gen_test_media.sh \
            --frames 30 \
            --output tests/fixtures/synthetic.mp4
          # Verify the output file exists and is non-empty
          test -s tests/fixtures/synthetic.mp4 && \
            echo "Synthetic clip generated: $(du -sh tests/fixtures/synthetic.mp4 | cut -f1)"

      - name: Generate multi-track synthetic clip
        if: steps.media-cache.outputs.cache-hit != 'true'
        # Multi-track variant (2 audio tracks) for the headless Godot smoke
        # suite's audio track enumeration and mid-play track switch tests.
        run: |
          bash tools/gen_test_media.sh \
            --frames 60 \
            --multi-track 2 \
            --output tests/fixtures/synthetic-mt.mp4
          test -s tests/fixtures/synthetic-mt.mp4 && \
            echo "Multi-track clip generated: $(du -sh tests/fixtures/synthetic-mt.mp4 | cut -f1)"

      - name: Generate real-clip matrix
        if: steps.media-cache.outputs.cache-hit != 'true'
        run: bash tools/gen_clip_matrix.sh

      - name: Upload test media artifact
        uses: actions/upload-artifact@v4
        with:
          name: test-media
          path: |
            tests/fixtures/synthetic.mp4
            tests/fixtures/synthetic-mt.mp4
            tests/fixtures/matrix
          if-no-files-found: error
          retention-days: 1

  core-tests:
    # No ffmpeg / test media needed: the Engine Core tests are hermetic.
    name: Core Tests (macOS)
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        # Note: submodules are intentionally NOT checked out here.
        # The Engine Core and its tests have zero godot-cpp dependency.

      - name: Install SCons
        run: brew install scons

      - name: Build Engine Core tests
        run: scons target=core_tests

      - name: Run Engine Core tests
        run: ./bin/core_tests --reporters=console --no-intro

  avf-coverage:
    name: AVF Backend + Real-Clip Matrix (macOS)
    runs-on: macos-latest
    needs: test-media

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        # No submodules: the AVFoundation backend + its tests have zero
        # godot-cpp / RenderingDevice dependency.

      - name: Install SCons
        run: brew install scons

      - name: Download test media
        uses: actions/download-artifact@v4
        with:
          name: test-media
          path: tests/fixtures

      - name: Build AVF backend tests
        run: scons target=avf_tests

      - name: Run AVF backend integration + matrix coverage
        run: ./bin/avf_tests --reporters=console --no-intro

  mf-coverage:
    name: MF Backend + Real-Clip Matrix (Windows)
    runs-on: windows-latest
    needs: test-media

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        # No submodules: the Media Foundation backend + its tests have zero
        # godot-cpp / RenderingDevice dependency.

      - name: Install SCons
        run: pip3 install scons

      - name: Build Engine Core tests
        # The Engine Core is platform-agnostic; build + run it under MSVC too so
        # Windows threading/timing behavior is covered, not just Darwin's.
        run: scons target=core_tests

      - name: Run Engine Core tests
        run: bin\core_tests.exe --reporters=console --no-intro

      - name: Download test media
        uses: actions/download-artifact@v4
        with:
          name: test-media
          path: tests/fixtures

      - name: Build MF backend tests
        # Uses the MSVC toolchain provided by the windows runner.
        run: scons target=mf_tests platform=windows

      - name: Run MF backend integration + matrix coverage
        run: bin\mf_tests.exe --reporters=console --no-intro

  godot-smoke:
    name: Godot Smoke (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    needs: test-media
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS
            os: macos-latest
            platform: macos
            godot-bin: .godot/Godot.app/Contents/MacOS/Godot
            install-scons: brew install scons
            install-ffmpeg: brew install ffmpeg
            lib-name: libnative-video.macos.template_debug.dylib
          - label: Windows
            os: windows-latest
            platform: windows
            godot-bin: .godot/Godot.exe
            install-scons: pip3 install scons
            install-ffmpeg: choco install ffmpeg -y --no-progress
            lib-name: native-video.windows.template_debug.x86_64.dll

    env:
      GODOT_BIN: ${{ github.workspace }}/${{ matrix.godot-bin }}
      SCONS_CACHE: ${{ github.workspace }}/.scons-cache/

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # The extension build requires godot-cpp (submodule).
          submodules: true

      - name: Read Godot version
        id: godot-version
        shell: bash
        run: |
          VER=$(cat .github/godot-version | tr -d '[:space:]')
          echo "version=${VER}" >> "$GITHUB_OUTPUT"
          echo "Godot version = ${VER}"

      - name: Cache Godot binary
        id: cache-godot
        uses: actions/cache@v4
        with:
          path: .godot
          key: godot-${{ hashFiles('.github/godot-version') }}-${{ runner.os }}

      - name: Download Godot (macOS)
        if: steps.cache-godot.outputs.cache-hit != 'true' && runner.os == 'macOS'
        shell: bash
        run: |
          VER="${{ steps.godot-version.outputs.version }}"
          URL="https://github.com/godotengine/godot/releases/download/${VER}/Godot_v${VER}_macos.universal.zip"
          echo "Downloading Godot ${VER} (macOS)..."
          curl -fL -o godot.zip "$URL"
          mkdir -p .godot
          unzip -q godot.zip -d .godot/
          rm -f godot.zip
          # Gatekeeper bypass: Godot binaries from GitHub releases are not
          # notarized and will be blocked by macOS quarantine on first launch.
          xattr -dr com.apple.quarantine .godot/Godot.app 2>/dev/null || true
          ls -la .godot/Godot.app/Contents/MacOS/Godot

      - name: Download Godot (Windows)
        if: steps.cache-godot.outputs.cache-hit != 'true' && runner.os == 'Windows'
        shell: pwsh
        run: |
          $ver = "${{ steps.godot-version.outputs.version }}"
          $url = "https://github.com/godotengine/godot/releases/download/${ver}/Godot_v${ver}_win64.exe.zip"
          Write-Output "Downloading Godot ${ver} (Windows)..."
          Invoke-WebRequest -Uri $url -OutFile godot.zip
          New-Item -ItemType Directory -Force -Path .godot | Out-Null
          Expand-Archive -Path godot.zip -DestinationPath .godot
          # Pick the main exe (not the console variant) and rename to Godot.exe.
          $godotExe = Get-ChildItem .godot/Godot*.exe | Where-Object { $_.Name -notmatch 'console' } | Select-Object -First 1
          if ($godotExe.Name -ne "Godot.exe") { Rename-Item -LiteralPath $godotExe.FullName -NewName "Godot.exe" }
          Remove-Item godot.zip
          Get-ChildItem .godot/Godot.exe

      - name: Verify Godot binary
        shell: bash
        run: |
          "${{ env.GODOT_BIN }}" --version 2>&1 | head -1

      - name: Install SCons
        run: ${{ matrix.install-scons }}

      - name: Install ffmpeg
        run: ${{ matrix.install-ffmpeg }}

      - name: Cache SCons build
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/.scons-cache/
            ${{ github.workspace }}/**/.sconsign.dblite
          key: godot-smoke-${{ matrix.platform }}-${{ hashFiles('src/**', 'SConstruct', 'build_profile.json', '.github/godot-version') }}
          restore-keys: |
            godot-smoke-${{ matrix.platform }}-

      - name: Build extension
        shell: bash
        run: |
          scons platform=${{ matrix.platform }} target=template_debug

      - name: Verify library installed
        shell: bash
        run: |
          test -f "tests/headless-smoke/bin/${{ matrix.platform }}/${{ matrix.lib-name }}" && \
            echo "Library installed to smoke project"

      - name: Download test media
        uses: actions/download-artifact@v4
        with:
          name: test-media
          path: tests/fixtures

      - name: Stage clips for smoke test
        shell: bash
        # Copy the multi-track clip (generated by test-media) into the smoke
        # test project and remux to .mov/.m4v for ResourceLoader coverage.
        run: bash tests/headless-smoke/stage-clips.sh tests/fixtures/synthetic-mt.mp4

      - name: Check H.264 + AAC decoder availability (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # Regression check: verify the runner image still ships the H.264 and
          # AAC decoder MFTs the Media Foundation backend depends on. A missing
          # decoder means a runner-image regression, not a code bug — fail fast
          # with a clear message instead of a playback timeout.
          $dlls = @{
              "msmpeg2vdec.dll" = "H.264 Video Decoder"
              "msauddecmft.dll" = "AAC Audio Decoder"
          }
          $missing = @()
          foreach ($dll in $dlls.Keys) {
              $path = Join-Path $env:SystemRoot "System32" $dll
              if (-not (Test-Path $path)) {
                  $missing += "$($dlls[$dll]) ($dll)"
              }
          }
          if ($missing.Count -gt 0) {
              $msg = "FATAL: Required Media Foundation decoders missing on runner. " +
                     "This is a runner-image regression, not a code bug.`n" +
                     "Missing: $($missing -join ', ')"
              Write-Error $msg
              exit 1
          }
          $h264ver = (Get-Item "$env:SystemRoot\System32\msmpeg2vdec.dll").VersionInfo.FileVersion
          $aacver  = (Get-Item "$env:SystemRoot\System32\msauddecmft.dll").VersionInfo.FileVersion
          Write-Output "H.264 Video Decoder: $h264ver"
          Write-Output "AAC Audio Decoder:   $aacver"
          Write-Output "All decoder MFTs available."

      - name: Run smoke suite
        shell: bash
        # Import + run + verify via the shared script — the single owner of
        # the smoke-failure policy (also used by tests/headless-smoke/run.sh).
        run: bash tests/headless-smoke/run-suite.sh
