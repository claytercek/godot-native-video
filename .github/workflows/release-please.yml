name: Release Please

on:
  push:
    branches: ["main"]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  # Build all platform binaries and attach the packaged zip to the release.
  #
  # This is invoked directly (workflow_call) rather than via an `on: release`
  # trigger in build.yml: releases created with the default GITHUB_TOKEN do
  # not fire workflow events, so a release trigger would silently never run.
  build:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    uses: ./.github/workflows/build.yml
    with:
      release-tag: ${{ needs.release-please.outputs.tag_name }}
    secrets: inherit
    permissions:
      contents: write
